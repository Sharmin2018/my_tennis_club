<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: #f4f6f9;
        }

        .login-card{
            width: 400px;
            margin: 100px auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,.1);
            background: white;
        }

        .title{
            text-align:center;
            margin-bottom:25px;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="login-card">

    <h2 class="title">Student Management System</h2>

    {% if form.errors %}
        <div class="alert alert-danger">
            Invalid Username or Password
        </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Username</label>
            <input
                type="text"
                name="username"
                class="form-control"
                placeholder="Enter Username">
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Enter Password">
        </div>

        <button class="btn btn-primary w-100">
            Login
        </button>
    </form>

    <hr>

    <div class="text-center">
        Don't have an account?
        <a href="/register/">Register</a>
    </div>

</div>

</body>
</html>
