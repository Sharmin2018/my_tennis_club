<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg,#0f172a,#1e293b,#2563eb);
            font-family: Arial, sans-serif;
        }

        .register-card{
            width:450px;
            padding:40px;
            border-radius:20px;
            background:rgba(255,255,255,0.12);
            backdrop-filter:blur(15px);
            box-shadow:0 8px 32px rgba(0,0,0,.25);
            color:white;
        }

        .register-title{
            text-align:center;
            font-weight:700;
            margin-bottom:10px;
        }

        .register-subtitle{
            text-align:center;
            color:#d1d5db;
            margin-bottom:30px;
        }

        .form-control{
            height:50px;
            border-radius:10px;
        }

        .btn-register{
            height:50px;
            border-radius:10px;
            font-weight:600;
        }

        .footer-text{
            text-align:center;
            margin-top:20px;
        }

        .footer-text a{
            color:#93c5fd;
            text-decoration:none;
        }

        .footer-text a:hover{
            text-decoration:underline;
        }
    </style>
</head>
<body>

<div class="register-card">
    {% if messages %}
    {% for message in messages %}
        <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}success{% endif %}">
            {{ message }}
        </div>
    {% endfor %}
    {% endif %}

    <h2 class="register-title">
        Create Account
    </h2>

    <p class="register-subtitle">
        Register to access the Student Management System
    </p>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Username</label>
            <input
                type="text"
                name="username"
                class="form-control"
                placeholder="Choose a username"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Create a password"
                required>
        </div>

        <button type="submit"
                class="btn btn-success btn-register w-100">
            Create Account
        </button>
    </form>

    <div class="footer-text">
        Already have an account?
        <a href="{% url 'login' %}">
            Login
        </a>
    </div>

</div>
</body>
</html>
